name: Long-Form Financial Empowerment Video
on:
  schedule:
    # Runs Wednesday and Saturday at 9 AM UTC
    - cron: '0 9 * * 3,6'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-long-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install canvas
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Generate and post long-form video
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: node scripts/generate-long-video.js

      - name: Commit topic progress
        run: |
          git config --local user.email "bot@thriverichly.com"
          git config --local user.name "Thrive Richly Bot"
          git add scripts/long-topics.json
          git diff --cached --quiet || git commit -m "📚 Long-form video posted: $(date -u +%Y-%m-%d)"
          git push
