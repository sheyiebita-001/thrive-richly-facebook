name: Daily Archetype Posts (5x/day)

on:
  schedule:
    - cron: '0 7 * * *'    # Slot 1 — 7 AM UTC (UK morning)
    - cron: '0 11 * * *'   # Slot 2 — 11 AM UTC (UK lunch / US morning)
    - cron: '0 14 * * *'   # Slot 3 — 2 PM UTC (US morning peak)
    - cron: '15 17 * * *'  # Slot 4 — 5:15 PM UTC (US afternoon)
    - cron: '0 21 * * *'   # Slot 5 — 9 PM UTC (US evening peak)
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-archetype:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install sharp

      - name: Install system fonts (Poppins)
        run: |
          mkdir -p ~/.fonts
          cd ~/.fonts
          curl -sL "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Bold.ttf" -o Poppins-Bold.ttf
          curl -sL "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Light.ttf" -o Poppins-Light.ttf
          curl -sL "https://github.com/google/fonts/raw/main/ofl/poppins/Poppins-Italic.ttf" -o Poppins-Italic.ttf
          fc-cache -fv

      - name: Random delay (0-12 min) to vary posting time
        run: |
          DELAY=$((RANDOM % 13))
          echo "⏳ Waiting ${DELAY} minutes for natural timing..."
          sleep ${DELAY}m

      - name: Post one archetype post
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: node scripts/post-archetype.js

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "archetype-bot@thriverichly.com"
          git config --local user.name "Archetype Bot"
          
          POSTED=$(node -e "const d=require('./scripts/archetype-topics.json'); console.log(d.posts.filter(p=>p.status==='posted').length)")
          TOTAL=$(node -e "const d=require('./scripts/archetype-topics.json'); console.log(d.totalPosts)")
          
          git add -A
          git commit -m "📊 Archetype posts: ${POSTED}/${TOTAL} complete
          Daily archetype post via Jeff Rose formula.
          Run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          
          git push
