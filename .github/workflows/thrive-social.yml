name: Thrive Social (Blotato queue runner)

# Publishes the next APPROVED entry from scripts/thrive-social/post-queue.json.
# No Claude in CI — the queue is drafted and human-approved locally with the
# thrive-social skill; this job only needs BLOTATO_API_KEY.
#
# MANUAL TRIGGER ONLY until 10 posts have published cleanly (see published-log.jsonl).
# After that, uncomment the schedule block to go autonomous (3x/week).
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: show the next post without generating video or publishing'
        type: boolean
        default: false
  # schedule:
  #   - cron: '30 12 * * 1,3,5'   # Mon/Wed/Fri 12:30 UTC — enable only after the 10-post approval ramp

permissions:
  contents: write

jobs:
  post-from-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish next approved post from queue
        env:
          BLOTATO_API_KEY: ${{ secrets.BLOTATO_API_KEY }}
        run: node scripts/thrive-social/post-from-queue.js ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Commit queue and log updates
        if: always()
        run: |
          git config --local user.email "thrive-social-bot@thriverichly.com"
          git config --local user.name "Thrive Social Bot"
          git add published-log.jsonl scripts/thrive-social/post-queue.json
          if ! git diff --cached --quiet; then
            git commit -m "Thrive Social: queue run $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
